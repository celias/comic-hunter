<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comic Hunter - Trending Comics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg: #14181C;
        --color-surface: #1f2832;
        --color-surface-container: #283038;
        --color-surface-container-high: #2c3540;
        --color-surface-container-highest: #344050;
        --color-primary: #40BCF4;
        --color-primary-container: #209CE4;
        --color-secondary: #00E054;
        --color-secondary-container: #00AC1C;
        --color-tertiary: #FF8000;
        --color-on-surface: #abc;
        --color-on-surface-muted: #678;
        --color-outline: #456;
        --color-outline-variant: #2C3440;
      }

      * {
        font-family: 'Sora', sans-serif;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-outline);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-on-surface-muted);
      }

      body {
        background: var(--color-bg);
        color: var(--color-on-surface);
        min-height: 100vh;
      }

      header {
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-outline-variant);
      }

      .logo {
        font-family: GraphikWeb, -apple-system, system-ui, 'Segoe UI', 'Hiragino Sans', Meiryo, sans-serif, ColorEmoji;
        font-weight: 400;
        font-size: 24px;
        line-height: 24px;
        color: var(--color-primary);
        text-shadow: 0 0 8px rgba(64, 188, 244, 0.8);
      }

      .nav-link {
        color: var(--color-on-surface-muted);
        transition: color 0.15s ease, background 0.15s ease;
        border-radius: 4px;
        border: 1px solid transparent;
        padding: 6px 12px;
        font-size: 0.875rem;
      }
      .nav-link:hover {
        color: var(--color-on-surface);
        background: var(--color-surface-container-high);
      }

      .search-input {
        background: var(--color-surface-container);
        border: 1px solid rgba(255, 45, 120, 0.3);
        border-radius: 4px;
        padding: 6px 12px;
        font-size: 0.875rem;
        color: var(--color-on-surface);
        width: 100%;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .search-input::placeholder {
        color: var(--color-on-surface-muted);
      }
      .search-input:focus {
        outline: none;
        border-color: rgba(255, 45, 120, 0.5);
        box-shadow: inset 0 0 12px rgba(255, 45, 120, 0.1);
      }

      .sign-out-btn {
        color: var(--color-on-surface-muted);
        font-size: 0.875rem;
        transition: color 0.15s ease;
        background: none;
        border: none;
        cursor: pointer;
      }
      .sign-out-btn:hover {
        color: var(--color-on-surface);
      }

      .section-title {
        color: var(--color-on-surface);
        font-size: 1.125rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }

      .comic-card {
        aspect-ratio: 2/3;
        position: relative;
        overflow: hidden;
        border-radius: 4px;
        cursor: pointer;
        background: var(--color-surface-container);
        border: 1px solid rgba(255, 45, 120, 0.3);
        transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      }
      .comic-card img {
        object-fit: cover;
        width: 100%;
        height: 100%;
      }
      .comic-card:hover {
        transform: scale(1.04);
        z-index: 10;
        border-color: rgba(255, 45, 120, 0.5);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7), 0 0 16px rgba(255, 45, 120, 0.2);
      }

      .quick-view-btn {
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .comic-card:hover .quick-view-btn {
        opacity: 1;
      }
      .quick-view-label {
        background: rgba(255, 45, 120, 0.9);
        color: #fff;
        font-size: 0.6875rem;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 4px;
        border: 1px solid rgba(255, 45, 120, 0.3);
        box-shadow: 0 0 12px rgba(255, 45, 120, 0.5);
      }

      .card-title {
        color: var(--color-on-surface);
        font-weight: 700;
        font-size: 10px;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-sub {
        color: var(--color-secondary);
        font-size: 9px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        opacity: 0.85;
      }

      .score-badge {
        font-size: 9px;
        font-weight: 900;
        padding: 2px 4px;
        border-radius: 3px;
        color: #000;
      }
      .score-top    { background: var(--color-secondary); color: #000; }
      .score-high   { background: var(--color-primary);   color: #fff; }
      .score-mid    { background: var(--color-tertiary);  color: #000; }
      .score-low    { background: var(--color-on-surface-muted); color: #000; }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="px-4 py-2 flex items-center gap-6 sticky top-0 z-50">
      <div class="flex items-center gap-1 shrink-0">
        <span class="logo text-2xl leading-none">LongBxd</span>
      </div>
      <nav class="flex items-center gap-1">
        <a href="#discover" class="nav-link">Discover</a>
        <a href="#collection" class="nav-link">My Collection</a>
        <a href="#swaps" class="nav-link">Swaps</a>
      </nav>
      <div class="flex-1 max-w-md mx-auto">
        <input
          type="search"
          placeholder="Search titles, authors, publishers..."
          class="search-input"
        />
      </div>
      <button class="sign-out-btn ml-auto shrink-0">Sign Out</button>
    </header>

    <!-- Main -->
    <main class="px-4 py-4">
      <h2 class="section-title">Trending Comics</h2>

      <div
        id="comic-grid"
        class="grid gap-1.5"
        style="grid-template-columns: repeat(auto-fill, minmax(110px, 1fr))"
      >
        <!-- Cards injected by script -->
      </div>
    </main>

    <script>
      const comics = [
        { title: "BATMAN",              sub: "r/DCcomics",     score: 9.5, img: "https://placehold.co/200x300/1a1a2e/fff?text=BATMAN" },
        { title: "BATMAN",              sub: "r/comicswap",    score: 8.8, img: "https://placehold.co/200x300/16213e/fff?text=BATMAN" },
        { title: "X-MEN",               sub: "r/Marvel",       score: 9.2, img: "https://placehold.co/200x300/0f3460/fff?text=X-MEN" },
        { title: "SANDMAN",             sub: "r/Sandman",      score: 9.8, img: "https://placehold.co/200x300/1b1b2f/fff?text=SANDMAN" },
        { title: "WATCHMEN",            sub: "r/DCcomics",     score: 9.9, img: "https://placehold.co/200x300/2d132c/fff?text=WATCHMEN" },
        { title: "SPIDER-MAN",          sub: "r/Marvel",       score: 9.1, img: "https://placehold.co/200x300/c72c41/fff?text=SPIDER-MAN" },
        { title: "SPIDER-MAN",          sub: "r/comicswap",    score: 8.5, img: "https://placehold.co/200x300/801336/fff?text=SPIDER-MAN" },
        { title: "Y THE LAST MAN",      sub: "r/comicbooks",   score: 9.3, img: "https://placehold.co/200x300/1b4332/fff?text=Y+LAST+MAN" },
        { title: "FABLES",              sub: "r/comicbooks",   score: 8.9, img: "https://placehold.co/200x300/5c4033/fff?text=FABLES" },
        { title: "WALKING DEAD",        sub: "r/TWD",          score: 9.0, img: "https://placehold.co/200x300/212121/fff?text=WALKING+DEAD" },
        { title: "INVINCIBLE",          sub: "r/Invincible",   score: 9.4, img: "https://placehold.co/200x300/ff6b35/fff?text=INVINCIBLE" },
        { title: "INVINCIBLE",          sub: "r/comicswap",    score: 8.7, img: "https://placehold.co/200x300/f7c59f/333?text=INVINCIBLE" },
        { title: "SAGA",                sub: "r/SagaComics",   score: 9.7, img: "https://placehold.co/200x300/2b2d42/fff?text=SAGA" },
        { title: "MONSTRESS",           sub: "r/comicbooks",   score: 9.6, img: "https://placehold.co/200x300/4a1942/fff?text=MONSTRESS" },
        { title: "LAZARUS",             sub: "r/ImageComics",  score: 8.6, img: "https://placehold.co/200x300/1d3557/fff?text=LAZARUS" },

        { title: "SOMETHING IS KILLING",sub: "r/ImageComics",  score: 8.9, img: "https://placehold.co/200x300/6d2b3d/fff?text=SIK" },
        { title: "HELLBOY",             sub: "r/DarkHorse",    score: 9.0, img: "https://placehold.co/200x300/7b2d00/fff?text=HELLBOY" },
        { title: "BLACK HAMMER",        sub: "r/DarkHorse",    score: 8.8, img: "https://placehold.co/200x300/3d405b/fff?text=BLACK+HAMMER" },

        { title: "KILL OR BE KILLED",   sub: "r/ImageComics",  score: 8.5, img: "https://placehold.co/200x300/4a0000/fff?text=KOBK" },
        { title: "SOUTHERN BASTARDS",   sub: "r/ImageComics",  score: 8.6, img: "https://placehold.co/200x300/5d4e37/fff?text=S+BASTARDS" },
        { title: "BITCH PLANET",        sub: "r/ImageComics",  score: 8.8, img: "https://placehold.co/200x300/b5451b/fff?text=BITCH+PLANET" },
        { title: "SEX CRIMINALS",       sub: "r/ImageComics",  score: 8.4, img: "https://placehold.co/200x300/c41e3a/fff?text=SEX+CRIMINALS" },
        { title: "INJECTION",           sub: "r/ImageComics",  score: 8.3, img: "https://placehold.co/200x300/1a3c34/fff?text=INJECTION" },
        { title: "DEPT OF TRUTH",       sub: "r/ImageComics",  score: 9.0, img: "https://placehold.co/200x300/232931/fff?text=DEPT+TRUTH" },
        { title: "ONCE & FUTURE",       sub: "r/BOOM",         score: 8.7, img: "https://placehold.co/200x300/3d2b1f/fff?text=ONCE+FUTURE" },
        { title: "DIE",                 sub: "r/ImageComics",  score: 8.9, img: "https://placehold.co/200x300/2d1b69/fff?text=DIE" },
        { title: "ICE CREAM MAN",       sub: "r/ImageComics",  score: 8.6, img: "https://placehold.co/200x300/f4a261/333?text=ICE+CREAM+MAN" },
        { title: "PAPER GIRLS",         sub: "r/ImageComics",  score: 9.2, img: "https://placehold.co/200x300/0077b6/fff?text=PAPER+GIRLS" },
        { title: "LOW",                 sub: "r/ImageComics",  score: 8.5, img: "https://placehold.co/200x300/006994/fff?text=LOW" },
        { title: "BLACK SCIENCE",       sub: "r/ImageComics",  score: 8.8, img: "https://placehold.co/200x300/1b2838/fff?text=BLACK+SCIENCE" },
        { title: "DEADLY CLASS",        sub: "r/ImageComics",  score: 9.1, img: "https://placehold.co/200x300/2d0a0a/fff?text=DEADLY+CLASS" },
        { title: "OLD GUARD",           sub: "r/ImageComics",  score: 8.9, img: "https://placehold.co/200x300/3b3b3b/fff?text=OLD+GUARD" },
        { title: "WYTHES",              sub: "r/ImageComics",  score: 8.4, img: "https://placehold.co/200x300/2e4057/fff?text=WYTHES" },
      ];

      function scoreBadgeClass(s) {
        if (s >= 9.5) return "score-badge score-top";
        if (s >= 9.0) return "score-badge score-high";
        if (s >= 8.5) return "score-badge score-mid";
        return "score-badge score-low";
      }

      const grid = document.getElementById("comic-grid");

      comics.forEach(({ title, sub, score, img }) => {
        const card = document.createElement("div");
        card.className = "comic-card";
        card.innerHTML = `
          <img src="${img}" alt="${title}" loading="lazy">
          <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(10,10,18,0.95) 0%, rgba(10,10,18,0.2) 50%, transparent 100%)"></div>
          <div class="quick-view-btn absolute inset-0 flex items-center justify-center">
            <span class="quick-view-label">Quick View</span>
          </div>
          <div class="absolute bottom-0 left-0 right-0 p-1.5">
            <p class="card-title">${title}</p>
            <p class="card-sub">${sub}</p>
          </div>
          <div class="absolute top-1 right-1">
            <span class="${scoreBadgeClass(score)}">${score}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    </script>
  </body>
</html>
